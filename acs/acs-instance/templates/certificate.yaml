{{- if .Values.clusterSubdomain }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rhacs-central-tls-cert
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: central-default-tls-cert
  issuerRef:
    name: zerossl-production-aws
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - central-{{ .Release.Namespace }}.{{ .Values.clusterSubdomain }}
{{- end }}
