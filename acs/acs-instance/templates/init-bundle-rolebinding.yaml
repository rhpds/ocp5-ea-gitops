---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-registration-secret-generator
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
subjects:
  - kind: ServiceAccount
    name: cluster-registration-secret-generator
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: cluster-registration-secret-generator
  apiGroup: rbac.authorization.k8s.io
