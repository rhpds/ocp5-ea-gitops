---
apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-registration-secret-generator
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: cluster-registration-secret-generator
      restartPolicy: OnFailure
      containers:
        - name: crs-generator
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              NAMESPACE="{{ .Release.Namespace }}"
              # Wait for Central to be ready
              echo "Waiting for Central..."
              until curl -sk https://central.${NAMESPACE}.svc:443/v1/ping; do
                echo "Central not ready, retrying in 10s..."
                sleep 10
              done
              echo "Central is ready"

              # Check if cluster-registration-secret already exists
              if oc get secret cluster-registration-secret -n "${NAMESPACE}" &>/dev/null; then
                echo "Cluster registration secret already exists, skipping"
                exit 0
              fi

              # Get admin password
{{- if .Values.adminPassword }}
              PASSWORD=$(oc get secret central-admin-password -n "${NAMESPACE}" -o jsonpath='{.data.password}' | base64 -d)
{{- else }}
              PASSWORD=$(oc get secret central-htpasswd -n "${NAMESPACE}" -o jsonpath='{.data.password}' | base64 -d)
{{- end }}

              # Generate a Cluster Registration Secret (CRS) via the Central API
              CRS_RESPONSE=$(curl -sk -u "admin:${PASSWORD}" \
                -X POST https://central.${NAMESPACE}.svc:443/v1/cluster-init/crs \
                -H "Content-Type: application/json" \
                -d '{"name":"{{ .Values.clusterName }}"}')

              # Extract the CRS value
              CRS_VALUE=$(echo "$CRS_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['crs'])" 2>/dev/null)

              if [ -z "$CRS_VALUE" ]; then
                echo "ERROR: Failed to generate CRS"
                echo "$CRS_RESPONSE"
                exit 1
              fi

              # Create the cluster-registration-secret
              oc create secret generic cluster-registration-secret \
                --from-literal=crs="$CRS_VALUE" \
                -n "${NAMESPACE}"

              echo "Cluster registration secret created successfully"
