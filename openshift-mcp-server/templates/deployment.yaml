---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      serviceAccountName: {{ .Values.name }}
      containers:
        - name: {{ .Values.name }}
          image: {{ .Values.image }}
          command: ["/openshift-mcp-server"]
          args: ["--config", "/etc/mcp/config.toml"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: mcp-config
              mountPath: /etc/mcp
      volumes:
        - name: mcp-config
          configMap:
            name: mcp-config
