image: quay.io/jfalkner1/mock-mcp-server:latest

gateway:
  name: mcp-gateway
  namespace: openshift-ingress

servers:
  - name: inventory
    hint: "Warehouse inventory management - products, stock levels, alerts"
    categories:
      - operations
    config: |
      name: inventory
      description: Warehouse inventory management system
      tools:
        - name: list_products
          description: List all products in the warehouse inventory, optionally filtered by category
          parameters:
            category:
              type: string
              description: "Product category to filter by (electronics, furniture, clothing, food)"
              required: false
          response:
            - id: "PRD-001"
              name: "Wireless Keyboard"
              category: "electronics"
              quantity: 342
              location: "Aisle 4, Shelf B"
              reorder_threshold: 50
              status: "in_stock"
            - id: "PRD-002"
              name: "Standing Desk"
              category: "furniture"
              quantity: 12
              location: "Warehouse 2, Bay 7"
              reorder_threshold: 10
              status: "low_stock"
            - id: "PRD-003"
              name: "USB-C Hub"
              category: "electronics"
              quantity: 0
              location: "Aisle 4, Shelf C"
              reorder_threshold: 25
              status: "out_of_stock"
            - id: "PRD-004"
              name: "Ergonomic Chair"
              category: "furniture"
              quantity: 87
              location: "Warehouse 2, Bay 3"
              reorder_threshold: 15
              status: "in_stock"
            - id: "PRD-005"
              name: "Monitor Arm"
              category: "electronics"
              quantity: 8
              location: "Aisle 5, Shelf A"
              reorder_threshold: 20
              status: "low_stock"
        - name: get_product
          description: Get detailed information about a specific product by its ID
          parameters:
            product_id:
              type: string
              description: "Product ID (e.g. PRD-001)"
              required: true
          response:
            id: "PRD-001"
            name: "Wireless Keyboard"
            category: "electronics"
            quantity: 342
            location: "Aisle 4, Shelf B"
            unit_cost: 24.99
            supplier: "TechParts Inc."
            last_restocked: "2026-07-15"
            reorder_threshold: 50
            status: "in_stock"
        - name: check_stock_alerts
          description: Check for products that are low on stock or out of stock
          parameters: {}
          response:
            alerts:
              - product_id: "PRD-002"
                name: "Standing Desk"
                quantity: 12
                threshold: 10
                severity: "warning"
                message: "Approaching reorder threshold"
              - product_id: "PRD-003"
                name: "USB-C Hub"
                quantity: 0
                threshold: 25
                severity: "critical"
                message: "Out of stock - immediate reorder required"
              - product_id: "PRD-005"
                name: "Monitor Arm"
                quantity: 8
                threshold: 20
                severity: "warning"
                message: "Below reorder threshold"
            summary:
              total_alerts: 3
              critical: 1
              warning: 2
        - name: update_quantity
          description: Update the stock quantity for a product (e.g. after receiving a shipment)
          parameters:
            product_id:
              type: string
              description: "Product ID to update"
              required: true
            quantity_change:
              type: integer
              description: "Quantity to add (positive) or remove (negative)"
              required: true
            reason:
              type: string
              description: "Reason for the change (shipment_received, sold, damaged, audit_correction)"
              required: true
          response:
            success: true
            product_id: "PRD-001"
            previous_quantity: 342
            new_quantity: 392
            change: 50
            reason: "shipment_received"
            timestamp: "2026-07-23T14:30:00Z"
        - name: search_products
          description: Search for products by name or keyword
          parameters:
            query:
              type: string
              description: "Search query to match against product names"
              required: true
          response:
            results:
              - id: "PRD-001"
                name: "Wireless Keyboard"
                category: "electronics"
                quantity: 342
                relevance: 0.95
              - id: "PRD-005"
                name: "Monitor Arm"
                category: "electronics"
                quantity: 8
                relevance: 0.42
            total: 2

  - name: accounts
    hint: "Customer account management - profiles, credit, order history"
    categories:
      - finance
    config: |
      name: accounts
      description: Customer account management system
      tools:
        - name: list_accounts
          description: List customer accounts, optionally filtered by status or tier
          parameters:
            status:
              type: string
              description: "Filter by status (active, suspended, closed)"
              required: false
            tier:
              type: string
              description: "Filter by tier (enterprise, business, starter)"
              required: false
          response:
            - id: "CUST-2205"
              name: "GlobalTech Industries"
              tier: "enterprise"
              status: "active"
              contact_email: "procurement@globaltech.example.com"
              credit_limit: 50000.00
              balance_due: 4500.00
              created_at: "2024-03-15"
            - id: "CUST-3318"
              name: "Bright Office Supplies"
              tier: "business"
              status: "active"
              contact_email: "orders@brightoffice.example.com"
              credit_limit: 10000.00
              balance_due: 89.97
              created_at: "2025-01-22"
            - id: "CUST-4401"
              name: "Acme Corp"
              tier: "enterprise"
              status: "active"
              contact_email: "ap@acme.example.com"
              credit_limit: 75000.00
              balance_due: 1249.99
              created_at: "2023-11-08"
            - id: "CUST-5587"
              name: "StartupHub Inc"
              tier: "starter"
              status: "active"
              contact_email: "admin@startuphub.example.com"
              credit_limit: 2500.00
              balance_due: 0.00
              created_at: "2026-06-01"
            - id: "CUST-6102"
              name: "OldCo Manufacturing"
              tier: "business"
              status: "suspended"
              contact_email: "finance@oldco.example.com"
              credit_limit: 15000.00
              balance_due: 12340.00
              suspension_reason: "Payment overdue 90+ days"
              created_at: "2024-08-30"
        - name: get_account
          description: Get detailed information about a specific customer account
          parameters:
            account_id:
              type: string
              description: "Customer account ID (e.g. CUST-4401)"
              required: true
          response:
            id: "CUST-4401"
            name: "Acme Corp"
            tier: "enterprise"
            status: "active"
            contact_email: "ap@acme.example.com"
            billing_address: "100 Innovation Way, Suite 400, Austin, TX 78701"
            credit_limit: 75000.00
            balance_due: 1249.99
            payment_terms: "Net 30"
            last_payment:
              amount: 6200.00
              date: "2026-07-10"
              method: "wire_transfer"
            ytd_spend: 48230.44
            account_manager: "Sarah Chen"
            created_at: "2023-11-08"
            notes: "Preferred customer. Auto-approve orders under $5000."
        - name: get_account_history
          description: Get recent order and payment history for a customer account
          parameters:
            account_id:
              type: string
              description: "Customer account ID"
              required: true
          response:
            account_id: "CUST-4401"
            account_name: "Acme Corp"
            recent_orders:
              - id: "TXN-90271"
                date: "2026-07-23"
                amount: 1249.99
                status: "completed"
