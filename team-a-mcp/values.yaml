              - id: "TXN-90275"
                date: "2026-07-22"
                amount: 349.98
                status: "refunded"
                description: "2x Ergonomic Chairs (returned)"
              - id: "TXN-90198"
                date: "2026-07-10"
                amount: 6200.00
                status: "completed"
