            recent_payments:
              - date: "2026-07-10"
                amount: 6200.00
                method: "wire_transfer"
                invoice: "INV-8834"
              - date: "2026-06-15"
                amount: 3450.00
                method: "wire_transfer"
                invoice: "INV-8791"
            thirty_day_spend: 7799.97
            sixty_day_spend: 11249.97
        - name: update_credit_limit
          description: Update the credit limit for a customer account
          parameters:
            account_id:
              type: string
              description: "Customer account ID"
              required: true
            new_limit:
              type: number
              description: "New credit limit amount"
              required: true
            reason:
              type: string
              description: "Reason for the change (credit_review, customer_request, risk_adjustment)"
              required: true
          response:
            success: true
            account_id: "CUST-4401"
            previous_limit: 75000.00
            new_limit: 100000.00
            reason: "credit_review"
            approved_by: "system"
            effective_date: "2026-07-23"
        - name: check_credit_available
          description: Check available credit for a customer before approving an order
          parameters:
            account_id:
              type: string
              description: "Customer account ID"
              required: true
            order_amount:
              type: number
              description: "Proposed order amount to check against available credit"
              required: true
          response:
            account_id: "CUST-4401"
            account_name: "Acme Corp"
            credit_limit: 75000.00
            balance_due: 1249.99
            available_credit: 73750.01
            requested_amount: 5000.00
            approved: true
            remaining_after_order: 68750.01
