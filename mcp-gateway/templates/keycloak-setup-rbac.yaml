---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-mcp-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-mcp-setup
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-initial-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-mcp-setup
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: keycloak-mcp-setup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: keycloak-mcp-setup
  apiGroup: rbac.authorization.k8s.io
