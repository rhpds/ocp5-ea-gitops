---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: mcp
      hostname: mcp.{{ .Values.gateway.clusterSubdomain }}
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: mcp-https
      hostname: mcp.{{ .Values.gateway.clusterSubdomain }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: mcp-gateway-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: mcps
      hostname: "*.mcp.internal"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
