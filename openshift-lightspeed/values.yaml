subscription:
  channel: stable
  installPlanApproval: Automatic
  name: lightspeed-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  namespace: openshift-lightspeed

llm:
  apiUrl: ""
  apiKey: ""
  provider: ""
  model: ""

featureGates:
  - MCPServer

mcpServer:
  name: openshift-mcp
  url: http://openshift-mcp-server.openshift-mcp.svc.cluster.local:8080/mcp
  timeout: 120

agentic:
  enabled: true
  operatorImage: quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/lightspeed-agentic-operator:main
  sandboxImage: quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/lightspeed-agentic-sandbox:main
  consoleImage: quay.io/redhat-user-workloads/crt-nshift-lightspeed-tenant/lightspeed-agentic-console:main
  sandboxMode: bare-pod
  githubRaw: https://raw.githubusercontent.com/openshift/lightspeed-agentic-operator/main

# TEMPORARY: Custom MCP server image for Perses integration
mcpImagePatch:
  csvName: lightspeed-operator.v1.1.1
  image: quay.io/tremes/ocp-mcp
