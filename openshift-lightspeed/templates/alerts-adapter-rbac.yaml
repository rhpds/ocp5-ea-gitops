{{- if .Values.agentic.enabled }}
---
# AgenticRuns: create and list AgenticRun CRs cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lightspeed-agentic-alerts-adapter-agenticruns
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: ["agentic.openshift.io"]
    resources: ["agenticruns"]
    verbs: ["create", "list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lightspeed-agentic-alerts-adapter-agenticruns
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lightspeed-agentic-alerts-adapter-agenticruns
subjects:
  - kind: ServiceAccount
    name: lightspeed-agentic-alerts-adapter
    namespace: {{ .Values.subscription.namespace }}
---
# AlertManager: read firing alerts from the monitoring stack.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lightspeed-agentic-alerts-adapter-alertmanager
  namespace: openshift-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: monitoring-alertmanager-view
subjects:
  - kind: ServiceAccount
    name: lightspeed-agentic-alerts-adapter
    namespace: {{ .Values.subscription.namespace }}
{{- end }}
