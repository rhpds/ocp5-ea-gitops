{{- if .Values.agentic.enabled }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: agentic-operator-mutating-webhook
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
  - name: agenticrunapproval-mutator.agentic.openshift.io
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Values.namespace }}
    clientConfig:
      service:
        name: agentic-operator-webhook-service
        namespace: {{ .Values.namespace }}
        path: /mutate-agenticrunapproval
    rules:
      - apiGroups:
          - agentic.openshift.io
        apiVersions:
          - v1alpha1
        operations:
          - UPDATE
        resources:
          - agenticrunapprovals
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions:
      - v1
{{- end }}
