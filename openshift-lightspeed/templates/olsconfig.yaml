{{- if .Values.llm.apiKey }}
---
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  namespace: {{ .Values.subscription.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  featureGates:
{{- range .Values.featureGates }}
    - {{ . }}
{{- end }}
  llm:
    providers:
      - credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llm.model }}
        name: {{ .Values.llm.provider }}
        type: {{ .Values.llm.provider }}
        url: {{ .Values.llm.apiUrl | quote }}
  mcpServers:
    - name: {{ .Values.mcpServer.name }}
      url: {{ .Values.mcpServer.url | quote }}
      timeout: {{ .Values.mcpServer.timeout }}
      headers:
        - name: kubernetes-authorization
          valueFrom:
            type: kubernetes
  ols:
    defaultModel: {{ .Values.llm.model }}
    defaultProvider: {{ .Values.llm.provider }}
    conversationCache:
      type: postgres
      postgres:
        sharedBuffers: 256MB
        maxConnections: 2000
{{- end }}
