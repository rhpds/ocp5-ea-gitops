{{- if .Values.agentic.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: agentic-console-activate
  namespace: {{ .Values.subscription.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      labels:
        app: agentic-console-activate
    spec:
      serviceAccountName: patch-mcp-image
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: activate-plugin
          image: registry.redhat.io/openshift4/ose-cli-rhel9:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/bash", "-c"]
          args:
            - |
              PLUGIN_NAME="lightspeed-agentic-console-plugin"

              CURRENT=$(oc get console.operator.openshift.io cluster -o jsonpath='{.spec.plugins}')
              if echo "$CURRENT" | grep -q "$PLUGIN_NAME"; then
                echo "Console plugin already registered"
                exit 0
              fi

              oc patch console.operator.openshift.io cluster --type=json \
                -p "[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"${PLUGIN_NAME}\"}]"

              echo "Console plugin ${PLUGIN_NAME} activated"
{{- end }}
