---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-mcp-image
  namespace: {{ .Values.subscription.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: patch-mcp-image
    namespace: {{ .Values.subscription.namespace }}
roleRef:
  kind: Role
  name: patch-mcp-image
  apiGroup: rbac.authorization.k8s.io
