{{- if .Values.agentic.enabled }}
{{- if .Values.llm.apiKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-creds-openai
  namespace: {{ .Values.subscription.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.llm.apiKey }}
{{- end }}
{{- end }}
