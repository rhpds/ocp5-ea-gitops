---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lightspeed-operator-manager-role
  namespace: {{ .Values.namespace }}
rules:
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
