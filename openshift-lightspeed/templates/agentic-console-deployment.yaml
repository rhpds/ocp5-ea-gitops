{{- if .Values.agentic.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-agentic-console-plugin
  namespace: {{ .Values.subscription.namespace }}
  labels:
    app: lightspeed-agentic-console-plugin
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lightspeed-agentic-console-plugin
  template:
    metadata:
      labels:
        app: lightspeed-agentic-console-plugin
    spec:
      serviceAccountName: lightspeed-agentic-console-plugin
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: {{ .Values.agentic.consoleImage }}
          imagePullPolicy: Always
          ports:
            - containerPort: 9443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              memory: 100Mi
          volumeMounts:
            - name: cert
              mountPath: /var/cert
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-tmp
              mountPath: /var/cache/nginx
      volumes:
        - name: cert
          secret:
            secretName: lightspeed-agentic-console-plugin-cert
        - name: nginx-conf
          configMap:
            name: lightspeed-agentic-console-plugin
        - name: nginx-tmp
          emptyDir: {}
{{- end }}
