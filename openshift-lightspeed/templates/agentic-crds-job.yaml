{{- if .Values.agentic.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: agentic-install-crds
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      labels:
        app: agentic-install-crds
    spec:
      serviceAccountName: lightspeed-agentic-operator
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: install-crds
          image: registry.redhat.io/openshift4/ose-cli-rhel9:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/bash", "-c"]
          args:
            - |
              BASE_URL="{{ .Values.agentic.githubRaw }}/config/crd/bases"
              CRDS=(
                "agentic.openshift.io_agenticolsconfigs.yaml"
                "agentic.openshift.io_agents.yaml"
                "agentic.openshift.io_analysisresults.yaml"
                "agentic.openshift.io_approvalpolicies.yaml"
                "agentic.openshift.io_escalationresults.yaml"
                "agentic.openshift.io_executionresults.yaml"
                "agentic.openshift.io_llmproviders.yaml"
                "agentic.openshift.io_agenticrunapprovals.yaml"
                "agentic.openshift.io_agenticruns.yaml"
                "agentic.openshift.io_verificationresults.yaml"
              )
              for crd in "${CRDS[@]}"; do
                echo "Applying CRD: ${crd}"
                curl -sL "${BASE_URL}/${crd}" | oc apply -f -
              done
              echo "All agentic CRDs applied successfully"
{{- end }}
