---
# TEMPORARY WORKAROUND: Patches the OLS CSV to use a custom MCP server
# image that supports Perses integration. Remove this job when OLS ships
# native Perses/MCP support in a future release.
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-mcp-image
  namespace: {{ .Values.subscription.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: patch-mcp-image
      restartPolicy: OnFailure
      containers:
        - name: patch-csv
          image: registry.redhat.io/openshift4/ose-cli:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              NAMESPACE="{{ .Values.subscription.namespace }}"
              CSV_NAME="{{ .Values.mcpImagePatch.csvName }}"
              NEW_IMAGE="{{ .Values.mcpImagePatch.image }}"
              OLD_IMAGE_PATTERN="openshift-mcp-server"

              echo "Waiting for CSV ${CSV_NAME} to exist..."
              until oc get csv "${CSV_NAME}" -n "${NAMESPACE}" &>/dev/null; do
                echo "CSV not found, retrying in 10s..."
                sleep 10
              done
              echo "CSV found"

              # Check if already patched
              CURRENT=$(oc get csv "${CSV_NAME}" -n "${NAMESPACE}" -o jsonpath='{.spec.relatedImages[?(@.name=="openshift-mcp-server")].image}')
              if [ "$CURRENT" = "$NEW_IMAGE" ]; then
                echo "CSV already patched, skipping"
                exit 0
              fi

              echo "Patching relatedImages..."
              RELATED_INDEX=$(oc get csv "${CSV_NAME}" -n "${NAMESPACE}" -o json | \
                python3 -c "import sys,json; imgs=json.load(sys.stdin)['spec']['relatedImages']; print([i for i,x in enumerate(imgs) if x['name']=='openshift-mcp-server'][0])")

              oc patch csv "${CSV_NAME}" -n "${NAMESPACE}" --type=json -p \
                "[{\"op\":\"replace\",\"path\":\"/spec/relatedImages/${RELATED_INDEX}/image\",\"value\":\"${NEW_IMAGE}\"}]"

              echo "Patching deployment args..."
              DEPLOY_JSON=$(oc get csv "${CSV_NAME}" -n "${NAMESPACE}" -o json)
              ARG_INDEX=$(echo "$DEPLOY_JSON" | python3 -c "
              import sys, json
              csv = json.load(sys.stdin)
              for d in csv['spec']['install']['spec']['deployments']:
                if d['name'] == 'lightspeed-operator-controller-manager':
                  for c in d['spec']['template']['spec']['containers']:
                    if c['name'] == 'manager':
                      for i, arg in enumerate(c.get('args', [])):
                        if 'openshift-mcp-server-image' in arg:
                          print(i)
                          break
              ")

              oc patch csv "${CSV_NAME}" -n "${NAMESPACE}" --type=json -p \
                "[{\"op\":\"replace\",\"path\":\"/spec/install/spec/deployments/0/spec/template/spec/containers/0/args/${ARG_INDEX}\",\"value\":\"--openshift-mcp-server-image=${NEW_IMAGE}\"}]"

              echo "CSV patched successfully with MCP image: ${NEW_IMAGE}"
