gitops:
  repoURL: https://github.com/rhpds/ocp5-ea-gitops.git
  targetRevision: main

argocd:
  namespace: openshift-gitops

# Placeholder for future operator version pinning via frozen OLM catalog snapshot
catalogSource:
  enabled: false
  name: redhat-operators-snapshot
  namespace: openshift-marketplace
  image: quay.io/gpte-devops-automation/olm_snapshot_redhat_catalog
  tag: v4.20_2026_02_11

cluster:
  subdomain: ""
  apiServer: ""

common:
  password: ""

acs:
  enabled: true
  name: acs
  namespace: acs
  clusterName: local-cluster
  adminPassword: ""

acsVirt:
  enabled: true
  name: acs-virt
  namespace: acs-virt

clusterObservability:
  enabled: true
  name: cluster-observability
  namespace: openshift-operators

mcpGateway:
  enabled: true
  name: mcp-gateway
  namespace: openshift-operators

openshiftMcpServer:
  enabled: true
  name: openshift-mcp-server
  namespace: openshift-mcp

openshiftLightspeed:
  enabled: true
  name: openshift-lightspeed
  namespace: openshift-lightspeed
  llm:
    apiUrl: ""
    apiKey: ""
    provider: openai
    model: qwen3-235b
