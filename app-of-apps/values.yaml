gitops:
  repoURL: https://github.com/rhpds/ocp5-ea-gitops.git
  targetRevision: main

argocd:
  namespace: openshift-gitops

# Placeholder for future operator version pinning via frozen OLM catalog snapshot
catalogSource:
  enabled: false
  name: redhat-operators-snapshot
  namespace: openshift-marketplace
  image: quay.io/gpte-devops-automation/olm_snapshot_redhat_catalog
  tag: v4.20_2026_02_11

cluster:
  subdomain: ""
  apiServer: ""

common:
  password: ""

acs:
  enabled: true
  name: acs
  namespace: acs
  clusterName: local-cluster
  adminPassword: ""

acsVirt:
  enabled: true
  name: acs-virt
  namespace: acs-virt

clusterObservability:
  enabled: true
  name: cluster-observability
  namespace: openshift-operators

clusterUpdate:
  enabled: true
  name: cluster-update
  namespace: openshift-cluster-version

mcpGateway:
  enabled: true
  name: mcp-gateway
  namespace: mcp-gateway

acsMcpServer:
  enabled: true
  name: acs-mcp-server
  namespace: acs-mcp

openshiftMcpServer:
  enabled: true
  name: openshift-mcp-server
  namespace: openshift-mcp

webTerminal:
  enabled: true
  name: web-terminal
  namespace: openshift-operators

openshiftLightspeedTroubleshooting:
  enabled: true
  name: openshift-lightspeed-troubleshooting
  namespace: inventory

openshiftAgenticLightspeed:
  enabled: true
  name: openshift-agentic-lightspeed
  namespace: openshift-lightspeed
  llm:
    apiUrl: ""
    apiKey: ""
    provider: ""
    model: ""
