{{- if .Values.openshiftMcpServer.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.openshiftMcpServer.name "namespace" .Values.argocd.namespace "syncWave" "2") }}
spec:
  destination:
    namespace: {{ .Values.openshiftMcpServer.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: redhat-openshift-mcp-server
    repoURL: https://charts.openshift.io
    targetRevision: {{ .Values.openshiftMcpServer.chartVersion }}
    helm:
      valuesObject:
        ingress:
          host: {{ .Values.openshiftMcpServer.name }}.{{ .Values.cluster.subdomain }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
{{- end }}
