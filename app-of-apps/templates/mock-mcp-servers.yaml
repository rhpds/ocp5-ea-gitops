{{- if .Values.mockMcpServers.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" .Values.mockMcpServers.name "namespace" .Values.argocd.namespace "syncWave" "2") }}
spec:
  destination:
    namespace: {{ .Values.mockMcpServers.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: mock-mcp-servers
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      valuesObject:
        auth:
          keycloakUrl: {{ .Values.mockMcpServers.auth.keycloakUrl }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
{{- end }}
