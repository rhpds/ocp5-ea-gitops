{{- if .Values.acsMcpServer.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
{{ include "app-of-apps.metadata" (dict "name" "acs-mcp-server-prereqs" "namespace" .Values.argocd.namespace "syncWave" "0") }}
spec:
  destination:
    namespace: {{ .Values.acsMcpServer.namespace }}
    server: https://kubernetes.default.svc
  project: default
  source:
    path: acs-mcp-server-prereqs
    repoURL: {{ .Values.gitops.repoURL }}
    targetRevision: {{ .Values.gitops.targetRevision }}
    helm:
      valuesObject:
        acsNamespace: {{ .Values.acs.namespace }}
        targetNamespace: {{ .Values.acsMcpServer.namespace }}
{{ include "app-of-apps.syncPolicy" . | indent 2 }}
{{- end }}
