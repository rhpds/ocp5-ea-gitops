apiVersion: v1
kind: ServiceAccount
metadata:
  name: reporting-service-rollout
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: reporting-service-rollout
  namespace: payments
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reporting-service-rollout
  namespace: payments
subjects:
  - kind: ServiceAccount
    name: reporting-service-rollout
    namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: reporting-service-rollout
---
apiVersion: batch/v1
kind: Job
metadata:
  name: reporting-service-rollout
  namespace: payments
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: reporting-service-rollout
      restartPolicy: Never
      containers:
        - name: rollout
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting 10 minutes before triggering rollout..."
              sleep 600
              echo "Patching reporting-service to v1.0.2..."
              oc -n payments set image deployment/reporting-service reporting-service=quay.io/afalossi/ts01-reporting-service:v1.0.2
              oc -n payments rollout status deployment/reporting-service --timeout=120s
