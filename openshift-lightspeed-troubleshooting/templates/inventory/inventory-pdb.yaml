apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: inventory-app-pdb
  namespace: inventory
  labels:
    app: inventory-app
    app.kubernetes.io/part-of: inventory-system
spec:
  minAvailable: {{ .Values.inventory.pdb.minAvailable }}
  selector:
    matchLabels:
      app: inventory-app
