apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: catalog-service-alerts
  namespace: catalog-service
spec:
  groups:
    - name: catalog-service.workloads
      rules:
        - alert: CatalogServicePodNotReady
          expr: |
            min_over_time(kube_pod_status_ready{namespace="catalog-service", condition="true"}[1m]) == 0
          for: 15s
          labels:
            severity: warning
          annotations:
            summary: "Pod {{`{{ $labels.pod }}`}} is not ready"
            description: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has been in a not-ready state for more than 15 seconds."
