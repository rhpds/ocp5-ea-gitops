apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-index-service
  namespace: catalog-service
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
  labels:
    app: catalog-index-service
    tier: indexing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-index-service
  template:
    metadata:
      labels:
        app: catalog-index-service
        tier: indexing
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: indexer
        image: busybox:1.36
        command: ["sh", "-c", "while true; do echo 'Running...'; sleep 5; done"]
        ports:
        - containerPort: 9200
          name: health
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9200
          initialDelaySeconds: 2
          periodSeconds: 4
          failureThreshold: 2
        resources:
          requests:
            cpu: "5m"
            memory: "32Mi"
          limits:
            memory: "64Mi"
