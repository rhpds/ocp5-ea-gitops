{{- range .Values.servers }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}-mcp-route
  namespace: {{ $.Release.Namespace }}
  labels:
    mcp-server: 'true'
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: team-b-gateway
  hostnames:
    - '{{ .name }}.mcp.internal'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .name }}-mcp
          port: 8080
{{- end }}
