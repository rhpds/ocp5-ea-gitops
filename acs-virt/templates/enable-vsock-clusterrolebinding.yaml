---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: enable-vsock
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: enable-vsock
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: enable-vsock
  apiGroup: rbac.authorization.k8s.io
