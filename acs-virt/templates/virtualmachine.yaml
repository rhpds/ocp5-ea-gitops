---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ .Values.vm.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: {{ .Values.vm.name }}
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        devices:
          autoattachVSOCK: true
          disks:
            - name: containerdisk
              bootOrder: 1
              disk:
                bus: virtio
            - name: cloudinitdisk
              bootOrder: 2
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        memory:
          guest: 4Gi
        resources:
          requests:
            memory: 4Gi
            cpu: "2"
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: {{ .Values.vm.image }}
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: {{ .Values.vm.user }}
              password: {{ .Values.vm.password }}
              chpasswd:
                expire: false
              ssh_pwauth: true
              write_files:
                - path: /etc/systemd/system/roxagent-prep.service
                  content: |
                    [Unit]
                    Description=Prepare native StackRox VM Agent inputs
                    [Service]
                    Type=oneshot
                    RemainAfterExit=yes
                    ExecStartPre=/bin/rm -rf /tmp/roxroot
                    ExecStartPre=/bin/mkdir -p /tmp/roxroot/etc/pki/entitlement
                    ExecStartPre=/bin/mkdir -p /tmp/roxroot/etc/yum.repos.d /tmp/roxroot/etc/yum/repos.d /tmp/roxroot/etc/distro.repos.d
                    ExecStartPre=/bin/mkdir -p /tmp/roxroot/var/lib/dnf
                    ExecStartPre=/bin/mkdir -p /tmp/roxroot/var/cache/dnf
                    ExecStartPre=/bin/mkdir -p /run/lock/roxagent
                    ExecStartPre=/bin/touch /tmp/roxroot/etc/os-release /tmp/roxroot/etc/redhat-release /tmp/roxroot/etc/system-release-cpe
                    ExecStart=/bin/rm -rf /tmp/roxagent-rpm
                    ExecStart=/bin/cp -a /var/lib/rpm /tmp/roxagent-rpm
                    ExecStart=/bin/chmod -R 755 /tmp/roxagent-rpm
                - path: /etc/systemd/system/roxagent.service
                  content: |
                    [Unit]
                    Description=StackRox VM Agent (native)
                    After=network.target roxagent-prep.service
                    Requires=roxagent-prep.service
                    [Service]
                    Type=oneshot
                    User=root
                    BindPaths=/tmp/roxagent-rpm:/tmp/roxroot/var/lib/rpm
                    BindReadOnlyPaths=/etc/os-release:/tmp/roxroot/etc/os-release
                    BindReadOnlyPaths=/etc/redhat-release:/tmp/roxroot/etc/redhat-release
                    BindReadOnlyPaths=/etc/system-release-cpe:/tmp/roxroot/etc/system-release-cpe
                    BindReadOnlyPaths=/etc/yum.repos.d:/tmp/roxroot/etc/yum.repos.d
                    BindReadOnlyPaths=/var/cache/dnf:/tmp/roxroot/var/cache/dnf
                    BindReadOnlyPaths=/var/lib/dnf:/tmp/roxroot/var/lib/dnf
                    ExecStart=/usr/local/bin/roxagent --host-path /tmp/roxroot
                    StandardOutput=journal
                    StandardError=journal
                - path: /etc/systemd/system/roxagent.timer
                  content: |
                    [Unit]
                    Description=Run StackRox VM Agent periodically
                    [Timer]
                    OnBootSec=5min
                    OnUnitActiveSec=3h40m
                    RandomizedDelaySec=40min
                    Persistent=true
                    [Install]
                    WantedBy=timers.target
              runcmd:
                - ["curl", "-sSfL", "https://mirror.openshift.com/pub/rhacs/assets/{{ .Values.vm.roxagentVersion }}/bin/linux/roxagent", "-o", "/usr/local/bin/roxagent"]
                - ["chmod", "755", "/usr/local/bin/roxagent"]
                - ["restorecon", "-v", "/usr/local/bin/roxagent"]
                - ["systemctl", "daemon-reload"]
                - ["systemctl", "enable", "--now", "roxagent.timer"]
                - ["systemctl", "start", "roxagent.service"]
