---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: lightspeed-operator
    app.kubernetes.io/instance: controller-manager
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: deployment
    app.kubernetes.io/part-of: lightspeed-operator
    control-plane: controller-manager
  name: lightspeed-operator-controller-manager
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        - --secure-metrics-server
        - --cert-dir=/etc/tls/private
        - --dataverse-exporter-image={{ .Values.images.dataverseExporter }}
        - --postgres-image={{ .Values.images.postgres }}
        - --service-image={{ .Values.images.serviceApi }}
        - --console-image={{ .Values.images.consolePlugin }}
        - --openshift-mcp-server-image={{ .Values.images.mcpServer }}
        - --agentic-console-image={{ .Values.images.agenticConsole }}
        - --alerts-adapter-image={{ .Values.images.alertsAdapter }}
        - --otel-collector-image={{ .Values.images.otelCollector }}
        - --rhokp-image={{ .Values.images.rhokp }}
        command:
        - /manager
        env:
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        image: {{ .Values.images.operator }}
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /etc/tls/private
          name: controller-manager-tls
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: lightspeed-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: controller-manager-tls
        secret:
          secretName: controller-manager-tls
